<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | JUGGI BUGGI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-wrapper {
            max-width: 600px;
            margin: 80px auto;
            padding: 40px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            color: #ffffff;
            text-align: center;
        }
        .contact-wrapper h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(to right, #f43f5e, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .contact-info {
            margin: 30px 0;
            text-align: left;
            background: rgba(15, 23, 42, 0.4);
            padding: 20px;
            border-radius: 12px;
        }
        .info-item {
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        .info-item strong {
            color: #f43f5e;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            background: linear-gradient(135deg, #f43f5e, #ec4899);
            color: white !important;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="contact-wrapper">
        <h1>Get In Touch</h1>
        <p>Connect for collaborations, media inquiries, or community channel networks.</p>
        
        <div class="contact-info">
            <div class="info-item"><strong>Email Portal:</strong> connect@juggibuggi.com</div>
            <div class="info-item"><strong>Studio Hours:</strong> Monday – Friday (10 AM to 6 PM)</div>
            <div class="info-item"><strong>Location Hub:</strong> Digital Space, India</div>
        </div>

        <a href="index.html" class="back-btn">← Return to Control Center</a>
    </div>
</body>
</html>
