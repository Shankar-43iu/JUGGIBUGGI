<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | JUGGI BUGGI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .settings-wrapper {
            max-width: 700px;
            margin: 60px auto;
            padding: 40px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            color: #ffffff;
        }
        .settings-header {
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }
        .settings-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #60a5fa;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            outline: none;
        }
        .form-group input:focus {
            border-color: #60a5fa;
        }
        .btn-save {
            padding: 12px 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-save:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="settings-wrapper">
        <div class="settings-header">
            <h1>⚙️ Account Settings</h1>
            <p style="color: #94a3b8;">Manage your profile and platform preferences</p>
        </div>
        
        <form onsubmit="event.preventDefault(); alert('Settings Saved Successfully!');">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" value="Shankar Mandal">
            </div>
            <div class="form-group">
                <label>Channel / Blog Name</label>
                <input type="text" value="JUGGI BUGGI">
            </div>
            <div class="form-group">
                <label>Update Password</label>
                <input type="password" placeholder="Enter new password">
            </div>
            <button type="submit" class="btn-save">Save Changes</button>
        </form>
        <br>
        <center><a href="dashboard.html" style="color: #94a3b8; text-decoration: none;">← Back to Dashboard</a></center>
    </div>
</body>
</html>
